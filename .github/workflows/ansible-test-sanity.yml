name: Sanity Checks

on:
  push:
    branches: [master]
  pull_request:
  schedule:
   - cron: '0 14 * * 1-5'

permissions:
  contents: read
  pull-requests: write

env:
  NAMESPACE: zscaler
  COLLECTION_NAME: ziacloud
  PYTHON_VERSION: 3.8

jobs:
  ## Sanity is required:
  #
  # https://docs.ansible.com/ansible/latest/dev_guide/testing_sanity.html
  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }} - Python ${{ matrix.python_ver }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible: "2.16"
            python_ver: "3.11"
          - ansible: "2.17"
            python_ver: "3.11"
          - ansible: "2.18"
            python_ver: "3.11"
          - ansible: "2.18"
            python_ver: "3.12"
          - ansible: "2.19"
            python_ver: "3.11"
          - ansible: "2.19"
            python_ver: "3.12"
          - ansible: "2.20"
            python_ver: "3.12"
    defaults:
      run:
        working-directory: ./ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION_NAME }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: ./ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION_NAME }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_ver }}

      - name: Install Poetry
        uses: Gr1N/setup-poetry@v9

      - name: Create lock file
        run: poetry lock

      - name: Install dependencies
        run: poetry install

      # Install the matrix-pinned ansible-core LAST and force it to win.
      # pyproject.toml declares `ansible-core = "*"`, so the `poetry install`
      # step above resolves to the newest release available for the runner's
      # Python (e.g. ansible-core 2.21 on Python 3.12). If we installed the
      # matrix version before `poetry install`, Poetry would clobber it and
      # ansible-test would run as 2.21 -> it then looks for a non-existent
      # tests/sanity/ignore-2.21.txt and every module fails missing-gplv3-license.
      # Installing the stable-<version> branch here (after Poetry) pins the
      # ansible-core actually under test so it matches ignore-<version>.txt.
      - name: Install ansible-core (${{ matrix.ansible }})
        run: |
          poetry run pip install --force-reinstall --no-deps \
            "https://github.com/ansible/ansible/archive/stable-${{ matrix.ansible }}.tar.gz" \
            --disable-pip-version-check

      - name: Run sanity tests
        timeout-minutes: 10
        run: poetry run make new-sanity